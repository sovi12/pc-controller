<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שליטה על המחשב - מאובטח</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // הנתונים האישיים שלך
        const firebaseConfig = {
            apiKey: "AIzaSyAx3So5oTiRvdnUjqzT75aAT9QtHZpN4iE",
            authDomain: "pc-wifi.firebaseapp.com",
            databaseURL: "https://pc-wifi-default-rtdb.firebaseio.com",
            projectId: "pc-wifi",
            storageBucket: "pc-wifi.firebasestorage.app",
            messagingSenderId: "699437577350",
            appId: "1:699437577350:web:8a18b8a6ec71aed5f90d07",
            measurementId: "G-DG2CZVPJNV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const statusRef = ref(db, 'is_blocked');

        const loginDiv = document.getElementById('loginDiv');
        const controlDiv = document.getElementById('controlDiv');
        const button = document.getElementById('toggleBtn');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        let currentState = false;

        // בדיקה האם המשתמש כבר מחובר
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginDiv.style.display = 'none'; // הסתרת מסך התחברות
                controlDiv.style.display = 'block'; // הצגת הכפתור

                onValue(statusRef, (snapshot) => {
                    currentState = snapshot.val();
                    if(currentState) {
                        button.textContent = "שחרר אינטרנט במחשב 🌐";
                        button.style.backgroundColor = "#4CAF50";
                    } else {
                        button.textContent = "חסום אינטרנט במחשב 🔒";
                        button.style.backgroundColor = "#f44336";
                    }
                });
            } else {
                loginDiv.style.display = 'block';
                controlDiv.style.display = 'none';
            }
        });

        // פונקציית התחברות
        loginBtn.onclick = () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, password)
                .catch((error) => {
                    errorMsg.textContent = "שגיאה בהתחברות. ודא שהאימייל והסיסמה נכונים.";
                });
        };

        // שינוי מצב האינטרנט
        button.onclick = () => {
            set(statusRef, !currentState);
        };
    </script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #121212; font-family: system-ui; text-align: center; color: white; }
        button { padding: 25px 35px; font-size: 22px; font-weight: bold; border: none; border-radius: 15px; color: white; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.95); }
        .login-box { display: flex; flex-direction: column; gap: 15px; background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 15px; font-size: 16px; border-radius: 10px; border: none; outline: none; background: #2d2d2d; color: white; }
        #loginBtn { background-color: #2196F3; padding: 15px; }
    </style>
</head>
<body>
    <div id="loginDiv" class="login-box">
        <h2 style="margin-top: 0;">התחברות למערכת</h2>
        <input type="email" id="email" placeholder="אימייל">
        <input type="password" id="password" placeholder="סיסמה">
        <button id="loginBtn">הכנס</button>
        <p id="errorMsg" style="color: #ff5252; margin-bottom: 0;"></p>
    </div>

    <div id="controlDiv" style="display: none;">
        <button id="toggleBtn">מתחבר למחשב...</button>
    </div>
</body>
</html>
